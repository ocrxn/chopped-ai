name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output_name: app-windows.exe
            separator: ";"
          - os: macos-latest
            output_name: app-macos
            separator: ":"
          - os: ubuntu-latest
            output_name: app-linux
            separator: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create .env file (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env

      - name: Create .env file (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Set-Content -Path .env -Value "DATABASE_URL=${{ secrets.DATABASE_URL }}"
          Add-Content -Path .env -Value "APP_KEY=${{ secrets.APP_KEY }}"

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --name "${{ matrix.output_name }}"
          --add-data "templates${{ matrix.separator }}templates"
          --add-data "static${{ matrix.separator }}static"
          --add-data ".env${{ matrix.separator }}."
          --hidden-import imageio
          --collect-all imageio
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*